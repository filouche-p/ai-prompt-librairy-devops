<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Library - DevOps</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header / Navbar -->
    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <!-- Icône SVG -->
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1 class="text-xl font-bold text-slate-900">AI Prompt Library</h1>
            </div>
            <div class="text-sm text-slate-500 font-medium">
                Projet DevOps
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col md:flex-row gap-8">
        
        <!-- Sidebar (Formulaires) -->
        <aside class="w-full md:w-1/3 flex flex-col gap-6">
            
            <!-- Formulaire Ajouter -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Ajouter un prompt
                </h2>
                
                <form method="post" id="addPrompt" class="flex flex-col gap-4">
                    <div>
                        <label for="title" class="block text-sm font-semibold text-slate-700 mb-1">Titre</label>
                        <input type="text" id="title" name="title" required placeholder="Ex: Générer un composant React" 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-sm">
                    </div>

                    <div>
                        <label for="category" class="block text-sm font-semibold text-slate-700 mb-1">Catégorie</label>
                        <input type="text" id="category" name="category" required placeholder="Ex: Développement" 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-sm">
                    </div>

                    <div>
                        <label for="prompt" class="block text-sm font-semibold text-slate-700 mb-1">Prompt</label>
                        <textarea id="prompt" name="prompt" required rows="4" placeholder="Écris ton instruction pour l'IA ici..." 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-sm resize-none"></textarea>
                    </div>

                    <button type="submit" class="mt-2 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
                        Enregistrer en mémoire
                    </button>
                </form>
            </div>

            <!-- Formulaire Recharger -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold text-slate-900 mb-3 text-slate-500 uppercase tracking-wider">Source de données</h2>
                
                <form method="post" id="reloadJsonFile" class="flex flex-col gap-3">
                    <div>
                        <label for="jsonPath" class="sr-only">Chemin d'accès du fichier</label>
                        <input type="text" id="jsonPath" name="jsonPath" placeholder="prompts.json" value="prompts.json"
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500 transition-colors text-sm bg-slate-50">
                    </div>
                    <button type="submit" class="w-full bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 font-medium py-2 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Recharger le fichier
                    </button>
                </form>
            </div>

        </aside>

        <!-- Main Content (Liste des prompts) -->
        <section class="w-full md:w-2/3">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-slate-900">Bibliothèque</h2>
                <span class="text-sm text-slate-500 bg-slate-200 px-3 py-1 rounded-full" id="prompt-count">0 prompts</span>
            </div>
            
            <!-- Conteneur Grid -->
            <div id="prompt-container" class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                <!-- Les cartes seront injectées ici par Javascript -->
            </div>
        </section>

    </main>

    <!-- Script externe appelant ton app.js -->
    <script src="./app.js"></script>
</body>
</html>
