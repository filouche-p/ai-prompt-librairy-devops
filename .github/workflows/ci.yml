name: CI/CD - AI Prompt Library

on:
    push:
        branches: [ "main", "develop" ]
    pull_request:
        branches: [ "main", "develop" ]

jobs:
    lint-and-test:
        name: Validation JSON et Linting
        runs-on: ubuntu-latest
        steps:
            - name: Checkout du code
              uses: actions/checkout@v4

            - name: Vérification de la syntaxe du prompts.json
              run: |
                  jq empty prompts.json || (echo "Erreur de syntaxe dans prompts.json" && exit 1)

            - name: Lint du Dockerfile
              uses: hadolint/hadolint-action@v3.1.0
              with:
                  dockerfile: Dockerfile

    docker-build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: lint-and-test
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout du code
              uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Configuration de Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and Push de l'image Docker
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: ${{ github.ref == 'refs/heads/main' }}
                  tags: ghcr.io/${{ github.repository_owner }}/ai-prompt-library:latest

    deploy-to-ec2:
        name: Deploy to EC2
        runs-on: ubuntu-latest
        needs: docker-build-and-push
        if: github.ref == 'refs/heads/main' 
        steps:
            - name: Déploiement via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USERNAME }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                    echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
                    sudo docker pull ghcr.io/${{ github.repository_owner }}/ai-prompt-library:latest
                    sudo docker stop prompt-library-app || true
                    sudo docker rm prompt-library-app || true
                    sudo docker run -d --name prompt-library-app -p 80:80 ghcr.io/${{ github.repository_owner }}/ai-prompt-library:latest

